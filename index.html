<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Netflix Clone</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body>


<!-- NAVBAR -->

<nav class="navbar navbar-dark bg-dark navbar-expand-lg">

<div class="container">

<a class="navbar-brand text-danger fw-bold fs-3">
NETFLIX
</a>

<div class="d-flex ms-auto">

<input
id="searchInput"
class="form-control me-2"
placeholder="Search movies"
/>

<button
class="btn btn-danger"
id="searchBtn">
Search
</button>

</div>

</div>

</nav>


<!-- HERO BANNER -->

<section class="hero">

<iframe
id="heroTrailer"
width="100%"
height="500"
frameborder="0"
allow="autoplay"
></iframe>

<div class="hero-overlay text-center text-white">

<h1>Unlimited movies, TV shows and more</h1>

<button
class="btn btn-danger mt-3"
id="playRandom">

Play Random Movie

</button>

</div>

</section>


<!-- MOVIE SECTIONS -->

<div class="container my-5">


<h3 class="text-white">Trending</h3>

<div
class="row movie-row"
id="trending">

</div>


<h3 class="text-white mt-5">Popular</h3>

<div
class="row movie-row"
id="popular">

</div>


</div>



<!-- TRAILER MODAL -->

<div class="modal fade" id="trailerModal">

<div class="modal-dialog modal-lg">

<div class="modal-content bg-dark">

<div class="modal-body">

<iframe
id="trailerFrame"
width="100%"
height="400"
frameborder="0"
allowfullscreen>
</iframe>

</div>

</div>

</div>

</div>



<!-- MOVIE DETAILS MODAL -->

<div class="modal fade" id="movieDetailsModal">

<div class="modal-dialog">

<div class="modal-content bg-dark text-white">

<div class="modal-header">

<h4 id="detailTitle"></h4>

</div>

<div class="modal-body">

<p id="detailOverview"></p>

<p id="detailRating"></p>

<p id="detailDate"></p>

<button
class="btn btn-success"
id="addWatchlist">

Add To My List

</button>

</div>

</div>

</div>

</div>



<!-- FOOTER -->

<footer class="text-center text-white bg-dark p-3">

Netflix Clone Project

</footer>



<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="script.js"></script>

</body>

</html>
